# =============================================
# SERVER
# =============================================
server.port=8098

# =============================================
# MySQL DATABASE
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/auraplays_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT CONFIGURATION
# =============================================
app.jwt.secret=AuraPlaysJwtSecretKey2024ForTokenSigningMustBeAtLeast256BitsLong!!
app.jwt.expiration-ms=86400000

# =============================================
# LOGGING
# =============================================
logging.level.org.springframework.security=WARN
logging.level.com.auraplays=DEBUG
